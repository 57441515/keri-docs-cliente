<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#4ECDC4">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Keri Docs">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Keri Docs</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{
  --cyan:#4ECDC4;--cyan-dark:#2BB5AC;--dark:#0D1117;--dark2:#161B22;
  --dark3:#1C2330;--dark4:#21262D;--border:rgba(78,205,196,0.18);
  --text:#E6EDF3;--muted:#7D8590;--silver:#C9D1D9;
  --danger:#FF6B6B;--success:#56D364;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 10% 20%,rgba(78,205,196,0.07) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 90% 80%,rgba(78,205,196,0.05) 0%,transparent 60%);pointer-events:none;z-index:0;}

/* LOGIN */
#login-screen{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:var(--dark);padding:16px;}
.login-card{background:var(--dark2);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:100%;max-width:420px;box-shadow:0 0 60px rgba(78,205,196,0.08);position:relative;overflow:hidden;}
.login-card::before{content:'';position:absolute;top:-1px;left:20%;right:20%;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);}
.logo-wrap{text-align:center;margin-bottom:28px;}
.login-logo{width:120px;height:auto;object-fit:contain;filter:drop-shadow(0 0 20px rgba(78,205,196,0.4));margin-bottom:12px;}
.logo-title{font-family:'DM Serif Display',serif;font-size:26px;}
.logo-title em{color:var(--cyan);font-style:normal;}
.logo-sub{font-size:12px;color:var(--cyan);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase;}
.fg input,.fg select{width:100%;padding:10px 13px;background:var(--dark3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.fg input:focus,.fg select:focus{border-color:var(--cyan);}
.fg select option{background:var(--dark3);}
.btn-primary{width:100%;padding:12px;background:linear-gradient(135deg,var(--cyan),var(--cyan-dark));border:none;border-radius:10px;color:var(--dark);font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:4px;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(78,205,196,0.3);}
.login-err{color:var(--danger);font-size:13px;text-align:center;margin-top:10px;display:none;}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh;position:relative;z-index:1;}
#app.on{display:flex;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:50;background:rgba(13,17,23,0.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:10px;height:58px;flex-shrink:0;}
.topbar-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.topbar-logo img{height:36px;width:auto;object-fit:contain;filter:drop-shadow(0 0 8px rgba(78,205,196,0.4));}
.topbar-logo span{font-family:'DM Serif Display',serif;font-size:19px;}
.topbar-logo em{color:var(--cyan);font-style:normal;}
.topbar-space{flex:1;}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--cyan-dark));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--dark);flex-shrink:0;}
.btn-logout{padding:6px 12px;background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--muted);font-family:'Outfit',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;}
.btn-logout:hover{border-color:var(--danger);color:var(--danger);}
.ham{display:none;background:transparent;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:2px;}
@media(max-width:768px){.ham{display:flex;}}

/* LAYOUT */
.body-wrap{display:flex;flex:1;min-height:0;}
.sidebar{background:var(--dark2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 0;overflow-y:auto;width:250px;flex-shrink:0;}
@media(max-width:768px){
  .sidebar{display:none;position:fixed;top:58px;left:0;bottom:0;width:80vw;max-width:270px;z-index:100;box-shadow:4px 0 24px rgba(0,0,0,0.5);}
  .sidebar.open{display:flex;}
  .body-wrap{display:block;}
  .content{width:100%;}
}
.sb-overlay{display:none;position:fixed;inset:0;z-index:99;background:rgba(0,0,0,0.3);-webkit-tap-highlight-color:transparent;}
.sb-overlay.on{display:block;}
.sb-sec{padding:0 12px;margin-bottom:20px;}
.sb-lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;padding:0 8px;}
.sb-btn{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;border:none;background:transparent;color:var(--silver);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;width:100%;text-align:left;transition:all .2s;}
.sb-btn:hover{background:var(--dark3);color:var(--text);}
.sb-btn.on{background:rgba(78,205,196,0.1);color:var(--cyan);}
.sb-btn .ic{font-size:15px;width:18px;text-align:center;}

/* CONTENT */
.content{padding:24px;overflow-y:auto;flex:1;}
.page{display:none;}
.page.on{display:block;}

/* PAGE HEADER */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px;}
.pt{font-family:'DM Serif Display',serif;font-size:24px;}
.pt span{color:var(--cyan);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:8px;border:none;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-c{background:linear-gradient(135deg,var(--cyan),var(--cyan-dark));color:var(--dark);}
.btn-c:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(78,205,196,0.3);}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--silver);}
.btn-g:hover{border-color:var(--cyan);color:var(--cyan);}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important;}

/* BREADCRUMB */
.bc{display:flex;align-items:center;gap:5px;margin-bottom:16px;flex-wrap:wrap;}
.bc-i{font-size:13px;color:var(--muted);cursor:pointer;}
.bc-i:hover{color:var(--cyan);}
.bc-i.on{color:var(--text);cursor:default;}
.bc-sep{color:var(--border);font-size:11px;}

/* FOLDERS */
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:16px;}
.fc{background:var(--dark2);border:1px solid var(--border);border-radius:11px;padding:14px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:7px;}
.fc:hover{border-color:rgba(78,205,196,0.4);background:var(--dark3);}
.fc-icon{font-size:32px;}
.fc-name{font-size:12px;font-weight:500;text-align:center;word-break:break-word;}
.fc-cnt{font-size:11px;color:var(--muted);}

/* DOCS TABLE */
.dtw{background:var(--dark2);border:1px solid var(--border);border-radius:13px;overflow:hidden;overflow-x:auto;}
.dt{width:100%;border-collapse:collapse;min-width:400px;}
.dt th{padding:11px 14px;text-align:left;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);background:var(--dark3);}
.dt td{padding:13px 14px;border-bottom:1px solid rgba(30,40,50,0.8);font-size:13px;}
.dt tr:last-child td{border-bottom:none;}
.dt tr:hover td{background:rgba(78,205,196,0.02);}
.doc-n{display:flex;align-items:center;gap:7px;min-width:120px;}
.da{display:flex;gap:5px;justify-content:flex-end;flex-wrap:wrap;}
.ftb{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
.ftb-pdf{background:rgba(255,107,107,0.15);color:#FF8F8F;}
.ftb-word{background:rgba(78,120,205,0.15);color:#7EA8F8;}
.ftb-excel{background:rgba(86,211,100,0.15);color:#56D364;}
.ftb-img{background:rgba(227,179,65,0.15);color:#E3B341;}
.ftb-other{background:var(--dark4);color:var(--muted);}

/* MODAL */
.mo{position:fixed;inset:0;z-index:200;display:none;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:16px;}
.mo.on{display:flex;}
.md{background:var(--dark2);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:440px;position:relative;animation:mIn .2s ease;}
@keyframes mIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.md-title{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:18px;}
.mc{position:absolute;top:14px;right:14px;background:transparent;border:none;color:var(--muted);font-size:18px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:5px;}
.mc:hover{background:var(--dark3);color:var(--text);}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}

/* DOC VIEWER */
.md-view{max-width:840px;width:96vw;max-height:92vh;display:flex;flex-direction:column;}
.dv-body{flex:1;overflow:auto;border-radius:9px;background:var(--dark3);min-height:300px;display:flex;align-items:center;justify-content:center;}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;}
.empty-ic{font-size:48px;margin-bottom:10px;opacity:.35;}
.empty-t{font-size:15px;color:var(--muted);margin-bottom:4px;}
.empty-s{font-size:12px;color:var(--muted);opacity:.6;}

/* TOAST */
.ta{position:fixed;bottom:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:7px;}
.toast{background:var(--dark2);border:1px solid var(--border);border-radius:9px;padding:10px 16px;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,0.4);min-width:200px;display:flex;align-items:center;gap:8px;animation:tIn .3s ease;}
@keyframes tIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
.toast.ok{border-color:rgba(86,211,100,0.3);}
.toast.err{border-color:rgba(255,107,107,0.3);}
.td{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.toast.ok .td{background:var(--success);}
.toast.err .td{background:var(--danger);}

/* CHANGE PASSWORD */
.pass-strength{height:3px;border-radius:2px;margin-top:4px;transition:all .3s;}

/* FOOTER */
.footer{text-align:center;padding:14px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);background:var(--dark2);flex-shrink:0;letter-spacing:.3px;}
.footer strong{color:var(--cyan);}

@media(max-width:600px){
  .content{padding:14px;}
  .ph{flex-direction:column;align-items:flex-start;}
  .fgrid{grid-template-columns:repeat(2,1fr);}
  .dt th:nth-child(3),.dt td:nth-child(3){display:none;}
  .da{flex-wrap:wrap;}
  .md{padding:18px 14px;}
}
</style>
</head>
<body>

<div class="sb-overlay" id="sb-ov" onclick="closeSB()"></div>

<!-- LOGIN - SOLO CLIENTE -->
<div id="login-screen">
  <div class="login-card">
    <div class="logo-wrap">
      <img class="login-logo" src="icon-192.png" alt="Keri Docs">
      <div class="logo-title">Keri <em>Docs</em></div>
      <div class="logo-sub">Portal de Documentos</div>
    </div>
    <div class="fg"><label>Tu empresa</label><select id="c-sel"></select></div>
    <div class="fg"><label>Contraseña</label><input id="c-pass" type="password" placeholder="••••••" autocomplete="current-password"></div>
    <button class="btn-primary" onclick="doLogin()">Acceder</button>
    <div class="login-err" id="login-err">Empresa o contraseña incorrectos</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <button class="ham" onclick="toggleSB()">☰</button>
    <a class="topbar-logo" href="#">
      <img src="icon-192.png" alt="Keri Docs">
      <span>Keri <em>Docs</em></span>
    </a>
    <div class="topbar-space"></div>
    <div class="avatar" id="t-av">K</div>
    <span id="t-name" style="font-size:13px;color:var(--silver);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
    <button class="btn-logout" onclick="logout()">Salir</button>
  </div>

  <div class="body-wrap">
    <div class="sidebar" id="sidebar">
      <div class="sb-sec">
        <div class="sb-lbl">Mis documentos</div>
        <button class="sb-btn on" onclick="showFolders()"><span class="ic">🏠</span>Inicio</button>
      </div>
      <div class="sb-sec" id="sb-folders"></div>
      <div class="sb-sec" style="margin-top:auto;padding-top:16px;border-top:1px solid var(--border)">
        <button class="sb-btn" onclick="openModal('mo-chpass')"><span class="ic">🔑</span>Cambiar contraseña</button>
      </div>
    </div>

    <div class="content" id="content">
      <div class="page on" id="pg-home">
        <div id="bc" class="bc"></div>
        <div id="main-content"></div>
      </div>
    </div>
  </div>

  <div class="footer">© 2025 <strong>Keri Data Solutions</strong> · Todos los derechos reservados</div>
</div>

<!-- Modal Cambiar Contraseña -->
<div class="mo" id="mo-chpass">
  <div class="md">
    <button class="mc" onclick="closeModal('mo-chpass')">✕</button>
    <div class="md-title">🔑 Cambiar Contraseña</div>
    <div class="fg"><label>Contraseña actual</label><input id="cp-old" type="password" placeholder="Tu contraseña actual"></div>
    <div class="fg">
      <label>Nueva contraseña</label>
      <input id="cp-new" type="password" placeholder="Nueva contraseña" oninput="checkPassStrength()">
      <div class="pass-strength" id="ps-bar"></div>
    </div>
    <div class="fg"><label>Confirmar nueva contraseña</label><input id="cp-rep" type="password" placeholder="Repite la nueva contraseña"></div>
    <div class="ma">
      <button class="btn btn-g" onclick="closeModal('mo-chpass')">Cancelar</button>
      <button class="btn btn-c" onclick="changePassword()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal Ver Documento -->
<div class="mo" id="mo-view">
  <div class="md md-view">
    <button class="mc" onclick="closeModal('mo-view')">✕</button>
    <div class="md-title" id="view-title" style="padding-right:36px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
    <div class="dv-body" id="view-body"></div>
    <div class="ma">
      <button class="btn btn-g" onclick="closeModal('mo-view')">Cerrar</button>
      <button class="btn btn-g" id="view-print" onclick="printDoc()">🖨 Imprimir</button>
      <button class="btn btn-c" id="view-dl">⬇ Descargar</button>
    </div>
  </div>
</div>

<div class="ta" id="ta"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCs5TRlFlsubNvSCoYowk2xrLf_4aByTjU",
  authDomain: "keri-docs.firebaseapp.com",
  projectId: "keri-docs",
  storageBucket: "keri-docs.firebasestorage.app",
  messagingSenderId: "437129539667",
  appId: "1:437129539667:web:1f3e65f35729b060ea56a6"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let client = null;
let currentFid = null;
let currentDoc = null;

// Cargar lista de clientes para el selector
async function loadClientList() {
  try {
    const snap = await db.collection('clients').orderBy('name').get();
    const sel = document.getElementById('c-sel');
    sel.innerHTML = '';
    snap.forEach(doc => {
      const c = doc.data();
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.name;
      sel.appendChild(opt);
    });
  } catch(e) {
    console.error(e);
  }
}

// Login
async function doLogin() {
  const cid = document.getElementById('c-sel').value;
  const pass = document.getElementById('c-pass').value;
  document.getElementById('login-err').style.display = 'none';
  try {
    const doc = await db.collection('clients').doc(cid).get();
    if (!doc.exists) { showErr(); return; }
    const data = doc.data();
    if (data.pass !== pass) { showErr(); return; }
    client = data;
    client.id = cid;
    await loadClientFolders();
    startSession();
  } catch(e) {
    showErr();
  }
}

function showErr() {
  document.getElementById('login-err').style.display = 'block';
}

// Cargar carpetas y docs del cliente
async function loadClientFolders() {
  client.folders = {};
  const fSnap = await db.collection('clients').doc(client.id).collection('folders').orderBy('name').get();
  for (const fd of fSnap.docs) {
    const f = fd.data();
    const dSnap = await db.collection('clients').doc(client.id).collection('folders').doc(f.id).collection('docs').get();
    f.docs = dSnap.docs.map(d => d.data());
    client.folders[f.id] = f;
  }
}

function startSession() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('on');
  document.getElementById('t-av').textContent = client.name[0].toUpperCase();
  document.getElementById('t-name').textContent = client.name;
  if (!client.passChanged) {
    setTimeout(() => {
      toast('Por favor cambia tu contraseña inicial 🔑', 'ok');
      openModal('mo-chpass');
    }, 800);
  }
  showFolders();
}

function logout() {
  client = null; currentFid = null; currentDoc = null;
  document.getElementById('app').classList.remove('on');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('c-pass').value = '';
}

// Mostrar carpetas
function showFolders(fid) {
  currentFid = fid || null;
  const folders = Object.values(client.folders);

  // Sidebar
  document.getElementById('sb-folders').innerHTML = `
    <div class="sb-lbl">Carpetas</div>
    ${folders.map(f => `<button class="sb-btn ${fid===f.id?'on':''}" onclick="showFolders('${f.id}')"><span class="ic">📁</span>${f.name}</button>`).join('')}`;

  // Breadcrumb
  document.getElementById('bc').innerHTML = `
    <span class="bc-i ${!fid?'on':''}" onclick="showFolders()">Mis Documentos</span>
    ${fid ? `<span class="bc-sep">›</span><span class="bc-i on">${client.folders[fid].name}</span>` : ''}`;

  // Contenido
  const cont = document.getElementById('main-content');
  if (!fid) {
    cont.innerHTML = folders.length === 0
      ? `<div class="empty"><div class="empty-ic">📁</div><div class="empty-t">No tienes documentos todavía</div><div class="empty-s">Keri te irá añadiendo documentos</div></div>`
      : `<div class="ph"><div class="pt">Mis <span>Carpetas</span></div></div>
         <div class="fgrid">${folders.map(f => `
           <div class="fc" onclick="showFolders('${f.id}')">
             <div class="fc-icon">📁</div>
             <div class="fc-name">${f.name}</div>
             <div class="fc-cnt">${f.docs.length} documento${f.docs.length !== 1 ? 's' : ''}</div>
           </div>`).join('')}</div>`;
  } else {
    const folder = client.folders[fid];
    let h = `<div class="ph"><div class="pt">📁 <span>${folder.name}</span></div></div>`;
    h += folder.docs.length === 0
      ? `<div class="empty"><div class="empty-ic">📄</div><div class="empty-t">Carpeta vacía</div><div class="empty-s">Keri aún no ha añadido documentos aquí</div></div>`
      : `<div class="dtw"><table class="dt">
           <thead><tr><th>Documento</th><th>Tipo</th><th>Fecha</th><th style="text-align:right">Acciones</th></tr></thead>
           <tbody>${folder.docs.map(d => docRow(d)).join('')}</tbody>
         </table></div>`;
    cont.innerHTML = h;
  }
  closeSB();
}

function docRow(d) {
  const ic = tIcon(d.type);
  return `<tr>
    <td><div class="doc-n"><span>${ic}</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:150px">${d.name}</span></div></td>
    <td><span class="ftb ftb-${d.type}">${d.type.toUpperCase()}</span></td>
    <td style="color:var(--muted)">${d.date}</td>
    <td><div class="da">
      <button class="btn btn-c btn-sm" onclick="viewDoc('${d.id}')">👁 Ver</button>
      <button class="btn btn-g btn-sm" onclick="dlDoc('${d.id}')">⬇ Descargar</button>
      <button class="btn btn-g btn-sm" onclick="printDocById('${d.id}')">🖨</button>
    </div></td></tr>`;
}

function tIcon(t) { return {pdf:'📕',word:'📘',excel:'📗',img:'🖼️',pptx:'📙'}[t] || '📄'; }

// Ver documento
async function viewDoc(docId) {
  const doc = findDoc(docId);
  if (!doc) { toast('Documento no encontrado', 'err'); return; }
  currentDoc = doc;
  document.getElementById('view-title').textContent = doc.name;
  document.getElementById('view-dl').onclick = () => dlDoc(docId);
  const body = document.getElementById('view-body');
  body.innerHTML = `<div style="text-align:center;padding:30px"><div style="font-size:40px">⏳</div><div style="color:var(--muted);margin-top:8px;font-size:13px">Cargando...</div></div>`;
  openModal('mo-view');

  let data = doc.data || null;
  if (!data && doc.chunks > 0) {
    data = await getChunkedData(docId);
    doc.data = data;
  }

  if (data) {
    if (doc.type === 'pdf') {
      const isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);
      if (isMobile) {
        body.innerHTML = `<div style="text-align:center;padding:40px 20px">
          <div style="font-size:52px;margin-bottom:14px">📕</div>
          <div style="font-size:16px;font-weight:600;margin-bottom:6px">${doc.name}</div>
          <div style="color:var(--muted);font-size:12px;margin-bottom:20px">${doc.date}</div>
          <button onclick="openPDF('${docId}')" class="btn btn-c" style="justify-content:center">📖 Abrir PDF</button>
        </div>`;
      } else {
        const iframe = document.createElement('iframe');
        iframe.src = data;
        iframe.style.cssText = 'width:100%;height:62vh;border:none;border-radius:8px;';
        body.innerHTML = '';
        body.appendChild(iframe);
      }
    } else if (doc.type === 'img') {
      const img = document.createElement('img');
      img.src = data;
      img.style.cssText = 'max-width:100%;max-height:62vh;border-radius:8px;object-fit:contain;';
      body.innerHTML = '';
      body.appendChild(img);
    } else {
      body.innerHTML = `<div style="text-align:center;padding:40px 20px">
        <div style="font-size:52px;margin-bottom:14px">${tIcon(doc.type)}</div>
        <div style="font-size:16px;font-weight:600;margin-bottom:6px">${doc.name}</div>
        <div style="color:var(--muted);font-size:12px;margin-bottom:20px">${doc.date}</div>
        <button onclick="dlDoc('${docId}')" class="btn btn-c" style="justify-content:center">⬇ Descargar para ver</button>
      </div>`;
    }
  }
}

async function getChunkedData(docId) {
  const doc = findDoc(docId);
  if (!doc || !doc.chunks) return null;
  let data = '';
  for (let i = 0; i < doc.chunks; i++) {
    const snap = await db.collection('clients').doc(client.id)
      .collection('folders').doc(currentFid)
      .collection('docs').doc(docId)
      .collection('chunks').doc('c' + i).get();
    data += snap.data().d;
  }
  return data;
}

function findDoc(docId) {
  for (const f of Object.values(client.folders)) {
    const d = f.docs.find(x => x.id === docId);
    if (d) return d;
  }
  return null;
}

function findDocFid(docId) {
  for (const [fid, f] of Object.entries(client.folders)) {
    if (f.docs.find(x => x.id === docId)) return fid;
  }
  return null;
}

// Descargar
async function dlDoc(docId) {
  const doc = findDoc(docId);
  if (!doc) { toast('Documento no encontrado', 'err'); return; }
  let data = doc.data || null;
  if (!data && doc.chunks > 0) {
    const fid = findDocFid(docId);
    const oldFid = currentFid;
    currentFid = fid;
    toast('Preparando descarga...', 'ok');
    data = await getChunkedData(docId);
    doc.data = data;
    currentFid = oldFid;
  }
  if (!data) { toast('Sin datos', 'err'); return; }
  const a = document.createElement('a');
  a.href = data; a.download = doc.name; a.click();
  toast('Descarga iniciada', 'ok');
}

// Imprimir
function printDoc() {
  if (!currentDoc || !currentDoc.data) { toast('Abre el documento primero', 'err'); return; }
  doPrint(currentDoc);
}

function printDocById(docId) {
  const doc = findDoc(docId);
  if (!doc) return;
  if (!doc.data) {
    viewDoc(docId).then(() => {});
    toast('Abre el documento y usa el botón imprimir', 'ok');
    return;
  }
  doPrint(doc);
}

function doPrint(doc) {
  if (doc.type === 'pdf' || doc.type === 'img') {
    const w = window.open('', '_blank');
    if (doc.type === 'pdf') {
      w.document.write(`<iframe src="${doc.data}" style="width:100%;height:100%;border:none"></iframe>`);
    } else {
      w.document.write(`<img src="${doc.data}" style="max-width:100%">`);
    }
    setTimeout(() => w.print(), 1000);
  } else {
    toast('Solo se pueden imprimir PDFs e imágenes directamente', 'ok');
  }
}

function openPDF(docId) {
  const doc = findDoc(docId);
  if (!doc || !doc.data) return;
  const b = atob(doc.data.split(',')[1]);
  const ab = new ArrayBuffer(b.length);
  const ia = new Uint8Array(ab);
  for (let i = 0; i < b.length; i++) ia[i] = b.charCodeAt(i);
  const blob = new Blob([ab], {type: 'application/pdf'});
  const url = URL.createObjectURL(blob);
  window.open(url, '_blank');
  setTimeout(() => URL.revokeObjectURL(url), 15000);
}

// Cambiar contraseña
function checkPassStrength() {
  const p = document.getElementById('cp-new').value;
  const bar = document.getElementById('ps-bar');
  let str = 0;
  if (p.length >= 6) str++;
  if (p.length >= 10) str++;
  if (/[A-Z]/.test(p)) str++;
  if (/[0-9]/.test(p)) str++;
  if (/[^A-Za-z0-9]/.test(p)) str++;
  const colors = ['#FF6B6B','#FF6B6B','#E3B341','#E3B341','#56D364'];
  bar.style.width = (str * 20) + '%';
  bar.style.background = colors[Math.max(0, str - 1)];
}

async function changePassword() {
  const old = document.getElementById('cp-old').value;
  const np = document.getElementById('cp-new').value;
  const rep = document.getElementById('cp-rep').value;
  if (old !== client.pass) { toast('La contraseña actual no es correcta', 'err'); return; }
  if (np.length < 6) { toast('La nueva contraseña debe tener al menos 6 caracteres', 'err'); return; }
  if (np !== rep) { toast('Las contraseñas no coinciden', 'err'); return; }
  await db.collection('clients').doc(client.id).update({pass: np, passChanged: true});
  client.pass = np;
  client.passChanged = true;
  closeModal('mo-chpass');
  ['cp-old','cp-new','cp-rep'].forEach(id => document.getElementById(id).value = '');
  toast('Contraseña cambiada correctamente ✓', 'ok');
}

// UI helpers
function toggleSB() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sb-ov').classList.toggle('on');
}
function closeSB() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sb-ov').classList.remove('on');
}
function openModal(id) { document.getElementById(id).classList.add('on'); }
function closeModal(id) { document.getElementById(id).classList.remove('on'); }
document.querySelectorAll('.mo').forEach(m => m.addEventListener('click', e => { if (e.target === m) m.classList.remove('on'); }));

function toast(msg, type = 'ok') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<div class="td"></div><span>${msg}</span>`;
  document.getElementById('ta').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// PWA Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    var code = [
      "const CACHE='keri-cliente-v1';",
      "const FILES=['/keri-docs-cliente/','/keri-docs-cliente/index.html','/keri-docs-cliente/manifest.json','/keri-docs-cliente/icon-192.png','/keri-docs-cliente/icon-512.png'];",
      "self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(FILES)));self.skipWaiting();});",
      "self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));self.clients.claim();});",
      "self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('/keri-docs-cliente/index.html'))));});"
    ].join('\n');
    var blob = new Blob([code], {type: 'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(e => console.log('SW:', e));
  });
}
